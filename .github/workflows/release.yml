name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./manifest.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "$tag_version" != "$version" ]; then
            echo "Tag version '$tag_version' does not match manifest.json version '$version'." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          ## Harmony Progression Player ${{ steps.version.outputs.version }}

          - Detects harmony progressions in Obsidian notes and plays them inline.
          - Supports numeric degrees, Roman numerals, chord symbols, extensions, altered chords, and slash chords.
          - Includes bundled sampled piano playback plus soft and bright synth options.
          EOF

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            manifest.json
            main.js
            styles.css

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            manifest.json main.js styles.css \
            --title "Harmony Progression Player ${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md
